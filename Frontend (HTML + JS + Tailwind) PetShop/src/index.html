<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Petshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- HEADER -->
<header class="bg-teal-500 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">🐾 PetShop</h1>
    <input type="text" placeholder="O que deseja procurar?" 
        class="p-2 rounded text-black w-1/3">
</header>

<!-- MENU DINÂMICO -->
<nav class="bg-teal-600 text-white p-2 flex justify-center gap-10" id="menu">
</nav>

<!-- BANNER -->
<section class="bg-yellow-400 p-6 flex justify-between items-center">
    <div>
        <h2 class="text-3xl font-bold">Frete Grátis</h2>
        <p>para todo o Brasil</p>
    </div>
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="100">
</section>

<!-- CATEGORIAS -->
<section class="p-6">
    <h2 class="text-xl font-bold mb-4"> Gerenciar Categorias</h2>

    <!-- FORM -->
    <div class="mb-4 flex gap-2">
        <input id="nome" placeholder="Nome" class="p-2 border rounded w-1/4">
        <input id="descricao" placeholder="Descrição" class="p-2 border rounded w-1/4">
        <button onclick="salvar()" class="bg-green-500 text-white px-4 rounded">
            Adicionar
        </button>
    </div>

    <!-- LISTA -->
    <div id="lista" class="grid grid-cols-4 gap-4"></div>
</section>

<script>
const API = "http://localhost:8080/api/categorias";

// LISTAR
function carregar() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            let html = "";

            data.forEach(c => {
                html += `
                    <div class="bg-white p-4 rounded shadow hover:scale-105 transition">
                        <h3 class="font-bold text-lg">${c.nome}</h3>
                        <p class="text-gray-600">${c.descricao || ""}</p>

                        <div class="mt-4 flex justify-between">
                            <button onclick="editar(${c.id_categoria})"
                                class="bg-yellow-400 px-2 py-1 rounded">
                                Editar
                            </button>

                            <button onclick="deletar(${c.id_categoria})"
                                class="bg-red-500 text-white px-2 py-1 rounded">
                                Excluir
                            </button>
                        </div>
                    </div>
                `;
            });

            document.getElementById("lista").innerHTML = html;
        });
}

// MENU DINÂMICO
function carregarMenu() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            let html = "";

            data.forEach(c => {
                html += `
                    <span class="cursor-pointer hover:underline">
                        ${iconeCategoria(c.nome)} ${c.nome}
                    </span>
                `;
            });

            document.getElementById("menu").innerHTML = html;
        });
}

// ÍCONES
function iconeCategoria(nome) {
    nome = nome.toLowerCase();

    if (nome.includes("cachorro")) return "🐶";
    if (nome.includes("gato")) return "🐱";
    if (nome.includes("pássaro")) return "🐦";
    if (nome.includes("peixe")) return "🐟";

    return "🐾";
}

// SALVAR
function salvar() {
    const nome = document.getElementById("nome").value;
    const descricao = document.getElementById("descricao").value;

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, descricao, ativo: true })
    }).then(() => {
        carregar();
        carregarMenu();
        document.getElementById("nome").value = "";
        document.getElementById("descricao").value = "";
    });
}

// DELETAR
function deletar(id) {
    fetch(`${API}/${id}`, {
        method: "DELETE"
    }).then(() => {
        carregar();
        carregarMenu();
    });
}

// EDITAR
function editar(id) {
    const nome = prompt("Novo nome:");
    const descricao = prompt("Nova descrição:");

    fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nome, descricao, ativo: true })
    }).then(() => {
        carregar();
        carregarMenu();
    });
}

// INICIAR
carregar();
carregarMenu();
</script>

</body>
</html>
